(function () {
  function init() {
    const canvas = document.getElementById('bg-stars');
    if (!canvas) return;
    const ctx = canvas.getContext('2d', { alpha: true });

    // ===== world constants =====
    const STORAGE_KEY = 'universe.cam.v2';
    const RENDER_DISTANCE = 5e18;   // meters — about 530 light-years
    const CHUNK_SIZE      = 5e17;   // meters — about 53 light-years per chunk
    const N_RADIUS        = Math.ceil(RENDER_DISTANCE / CHUNK_SIZE); // chunks in each axis
    // Drift is fixed at c (speed of light). Apparent motion comes from a
    // simulated TIME dilation — visitors choose how many seconds of universe
    // time pass per real second. Default = 1 year/sec (≈ 1 light-year/sec).
    const C               = 299792458;
    const DRIFT_V         = C;          // m/s, fixed at speed of light
    const SEC_PER_DAY     = 86400;
    const SEC_PER_YEAR    = 31557600;
    let TIME_MUL          = SEC_PER_YEAR; // universe-seconds elapsed per real-second
    const TIME_DEFAULT    = SEC_PER_YEAR;
    const CACHE_LIMIT     = 50000;  // chunk cache hard limit
    const FOCAL_BASE      = 0.95;   // multiplier × max(w,h)

    // ===== state =====
    let cam = readInitial();
    let drifting = true;
    let lastFrameMs = performance.now();
    let lastSavedMs = 0;
    const chunkCache = new Map();

    function readInitial() {
      try {
        const u = new URLSearchParams(location.search);
        if (u.has('x') && u.has('y') && u.has('z')) {
          const a = ['x', 'y', 'z'].map((k) => parseFloat(u.get(k)));
          if (a.every(Number.isFinite)) return a;
        }
        const stored = localStorage.getItem(STORAGE_KEY);
        if (stored) {
          const p = JSON.parse(stored);
          if (Array.isArray(p) && p.length === 3 && p.every(Number.isFinite)) return p;
        }
      } catch {}
      return [0, 0, 0];
    }

    function savePosition() {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(cam)); } catch {}
    }
    function updateUrl() {
      try {
        const u = new URL(location.href);
        u.searchParams.set('x', cam[0].toExponential(3));
        u.searchParams.set('y', cam[1].toExponential(3));
        u.searchParams.set('z', cam[2].toExponential(3));
        history.replaceState(null, '', u.pathname + u.search + u.hash);
      } catch {}
    }

    // ===== deterministic PRNG seeded from chunk coords =====
    function hashChunk(x, y, z) {
      let h = 0xA1EC0DE >>> 0;
      h = Math.imul(h ^ (x | 0), 0x85EBCA6B) >>> 0;
      h = Math.imul(h ^ (y | 0), 0xC2B2AE35) >>> 0;
      h = Math.imul(h ^ (z | 0), 0x27D4EB2F) >>> 0;
      h = (h ^ (h >>> 16)) >>> 0;
      return h || 1;
    }
    // Stable per-object seed for deterministic LOD detail
    function objHash(o) {
      // Combine world coords; integer cast loses precision at very high coords but
      // that's fine — neighbouring objects still get distinct seeds.
      let h = 0x9E3779B1 >>> 0;
      h = Math.imul(h ^ ((o.wx / 1e10) | 0), 0x85EBCA6B) >>> 0;
      h = Math.imul(h ^ ((o.wy / 1e10) | 0), 0xC2B2AE35) >>> 0;
      h = Math.imul(h ^ ((o.wz / 1e10) | 0), 0x27D4EB2F) >>> 0;
      return (h ^ (h >>> 16)) >>> 0;
    }
    function mulberry32(seed) {
      let s = seed >>> 0;
      return function () {
        s = (s + 0x6D2B79F5) >>> 0;
        let t = s;
        t = Math.imul(t ^ (t >>> 15), t | 1);
        t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
      };
    }

    // ===== object types =====
    // Spectral classes, visually-weighted (real M dwarfs dominate by count but
    // are dim — we bias toward what'd actually appear in a dark sky).
    // [class, color, weight, pixelSizeMul, physRadius (m)]
    const SPECTRAL = [
      ['O',  [155, 176, 255], 0.005, 1.7,  1.0e10],
      ['B',  [170, 191, 255], 0.04,  1.45, 5.0e9],
      ['A',  [202, 215, 255], 0.08,  1.2,  2.0e9],
      ['F',  [248, 247, 255], 0.12,  1.05, 1.5e9],
      ['G',  [255, 244, 234], 0.18,  1.0,  1.0e9],
      ['K',  [255, 210, 161], 0.27,  0.88, 7.0e8],
      ['M',  [255, 160, 110], 0.305, 0.68, 3.0e8],
    ];
    function pickSpectral(r) {
      let acc = 0;
      for (const c of SPECTRAL) {
        acc += c[2];
        if (r < acc) return c;
      }
      return SPECTRAL[SPECTRAL.length - 1];
    }

    // Planet archetypes — each defines a base color and a render style. The
    // generator picks one from this list with the given weight, then renderer
    // draws type-specific realistic features (bands, craters, clouds, lava…).
    const PLANET_TYPES = [
      { kind: 'rocky',     color: [150, 110, 80],   weight: 0.30 }, // mercury/moon
      { kind: 'desert',    color: [200, 150, 95],   weight: 0.15 }, // mars/tatooine
      { kind: 'ocean',     color: [80, 130, 200],   weight: 0.15 }, // earth-like
      { kind: 'iceworld',  color: [200, 220, 240],  weight: 0.10 }, // europa
      { kind: 'gas_giant', color: [210, 175, 140],  weight: 0.16 }, // jupiter/saturn
      { kind: 'ice_giant', color: [110, 170, 220],  weight: 0.08 }, // uranus/neptune
      { kind: 'lava',      color: [200, 70, 40],    weight: 0.04 }, // hot rocky
      { kind: 'shrouded',  color: [210, 200, 130],  weight: 0.02 }, // venus-like sulfur
    ];
    function pickPlanetType(r) {
      let acc = 0;
      for (const t of PLANET_TYPES) {
        acc += t.weight;
        if (r < acc) return t;
      }
      return PLANET_TYPES[0];
    }
    const NEBULA_PALETTE = [
      [180, 100, 220],
      [220, 90, 150],
      [80, 160, 230],
      [230, 110, 90],
      [120, 200, 180],
    ];

    // ===== chunk generator =====
    function generateChunk(chx, chy, chz) {
      const r = mulberry32(hashChunk(chx, chy, chz));
      const cellRoll = r();
      // Most chunks empty — realistic interstellar sparsity
      let count = 0;
      if (cellRoll < 0.55) count = 0;
      else if (cellRoll < 0.92) count = 1;
      else if (cellRoll < 0.99) count = 2;
      else count = 3;

      const out = [];
      for (let i = 0; i < count; i++) {
        const wx = chx * CHUNK_SIZE + r() * CHUNK_SIZE;
        const wy = chy * CHUNK_SIZE + r() * CHUNK_SIZE;
        const wz = chz * CHUNK_SIZE + r() * CHUNK_SIZE;
        const t = r();
        const obj = { wx, wy, wz };
        if (t < 0.85) {
          const cls = pickSpectral(r());
          obj.type = 'star';
          obj.cr = cls[1][0];
          obj.cg = cls[1][1];
          obj.cb = cls[1][2];
          obj.sizeMul = cls[3];
          obj.physRadius = cls[4] * (0.7 + r() * 0.6); // 70%-130% of class typical
          obj.bri = 0.5 + r() * 0.5;
        } else if (t < 0.95) {
          const pt = pickPlanetType(r());
          obj.type = 'planet';
          obj.kind = pt.kind;
          obj.cr = pt.color[0]; obj.cg = pt.color[1]; obj.cb = pt.color[2];
          // Physical radius depends on kind — gas/ice giants are large, rocky are small
          if (pt.kind === 'gas_giant') obj.physRadius = 4e7 + r() * 8e7;       // 40-120k km
          else if (pt.kind === 'ice_giant') obj.physRadius = 2e7 + r() * 5e7;  // 20-70k km
          else if (pt.kind === 'shrouded')  obj.physRadius = 5e6 + r() * 1.5e7;
          else if (pt.kind === 'lava')      obj.physRadius = 2e6 + r() * 8e6;
          else obj.physRadius = 1.5e6 + r() * 1.2e7;                            // rocky/desert/ocean/ice
          // Rings: more common on gas giants
          obj.hasRing = r() < (pt.kind === 'gas_giant' ? 0.55 : 0.05);
        } else if (t < 0.992) {
          const n = NEBULA_PALETTE[Math.floor(r() * NEBULA_PALETTE.length)];
          obj.type = 'nebula';
          obj.cr = n[0]; obj.cg = n[1]; obj.cb = n[2];
          obj.scale = 0.6 + r() * 1.4;
          // 0.05 – 1 light-year diameter cloud
          obj.physRadius = 5e14 + r() * 1e16 * obj.scale;
        } else {
          obj.type = 'blackhole';
          obj.scale = 0.5 + r() * 0.6;
          // 1e8 to 1e12 m event horizon (stellar to intermediate-mass)
          obj.physRadius = 1e8 + r() * 1e12;
        }
        out.push(obj);
      }
      return out;
    }

    function getChunk(chx, chy, chz) {
      const k = chx + '|' + chy + '|' + chz;
      let v = chunkCache.get(k);
      if (!v) {
        v = generateChunk(chx, chy, chz);
        if (chunkCache.size >= CACHE_LIMIT) {
          // Lazy eviction: drop oldest 20%
          let i = 0;
          const toDrop = Math.floor(CACHE_LIMIT * 0.2);
          for (const key of chunkCache.keys()) {
            if (i++ >= toDrop) break;
            chunkCache.delete(key);
          }
        }
        chunkCache.set(k, v);
      }
      return v;
    }

    // ===== viewport =====
    let W = 0, H = 0, cx = 0, cy = 0, dpr = 1, focal = 0;
    function resize() {
      dpr = Math.min(window.devicePixelRatio || 1, 2);
      W = window.innerWidth;
      H = window.innerHeight;
      canvas.width = W * dpr;
      canvas.height = H * dpr;
      canvas.style.width = W + 'px';
      canvas.style.height = H + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      cx = W / 2; cy = H / 2;
      focal = Math.max(W, H) * FOCAL_BASE;
    }
    resize();
    window.addEventListener('resize', resize);

    function isDark() {
      return document.documentElement.getAttribute('data-theme') === 'dark';
    }

    // ===== UI =====
    const elX = document.getElementById('coord-x');
    const elY = document.getElementById('coord-y');
    const elZ = document.getElementById('coord-z');
    const inp = document.getElementById('coord-input');
    const form = document.getElementById('coord-form');
    const btnOrigin = document.getElementById('coord-origin');
    const btnRandom = document.getElementById('coord-random');
    const btnPause = document.getElementById('coord-pause');

    function fmt(n) {
      if (!Number.isFinite(n)) return '—';
      const a = Math.abs(n);
      if (a < 1000) return n.toFixed(0);
      return n.toExponential(3);
    }
    function refreshUI() {
      if (!elX) return;
      elX.textContent = fmt(cam[0]);
      elY.textContent = fmt(cam[1]);
      elZ.textContent = fmt(cam[2]);
    }
    refreshUI();

    function teleport(x, y, z) {
      cam = [x, y, z];
      refreshUI();
      savePosition();
      updateUrl();
    }

    if (form) {
      form.addEventListener('submit', (e) => {
        e.preventDefault();
        const raw = (inp.value || '').trim();
        if (!raw) return;
        const parts = raw.split(/[\s,]+/).map(Number);
        if (parts.length !== 3 || !parts.every(Number.isFinite)) {
          inp.style.borderColor = '#dc2626';
          setTimeout(() => { inp.style.borderColor = ''; }, 1200);
          return;
        }
        teleport(parts[0], parts[1], parts[2]);
        inp.value = '';
      });
    }
    if (btnOrigin) {
      btnOrigin.addEventListener('click', () => teleport(0, 0, 0));
    }
    if (btnRandom) {
      btnRandom.addEventListener('click', () => {
        // Jump to a random spot within a meaningful range
        const span = 1e18;
        teleport(
          (Math.random() - 0.5) * span,
          (Math.random() - 0.5) * span,
          (Math.random() - 0.5) * span
        );
      });
    }
    if (btnPause) {
      btnPause.addEventListener('click', () => {
        drifting = !drifting;
        btnPause.textContent = drifting ? '⏸ Pause' : '▶ Resume';
      });
    }
    document.querySelectorAll('.coord-speed').forEach((b) => {
      b.addEventListener('click', () => {
        const m = parseFloat(b.dataset.mul) || 1;
        TIME_MUL = m;
        document.querySelectorAll('.coord-speed').forEach((x) => x.classList.toggle('coord-speed-active', x === b));
      });
    });
    // Mark default active (1 year/sec)
    const defaultSpeed = document.querySelector('.coord-speed[data-mul="' + TIME_DEFAULT + '"]');
    if (defaultSpeed) defaultSpeed.classList.add('coord-speed-active');

    // ===== WASD/QE navigation =====
    const keys = new Set();
    function isTypingTarget(t) {
      return t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.isContentEditable);
    }
    window.addEventListener('keydown', (e) => {
      if (isTypingTarget(e.target)) return;
      const k = e.key.length === 1 ? e.key.toLowerCase() : e.key;
      keys.add(k);
      if (k === ' ' || (['w','a','s','d','q','e'].includes(k))) e.preventDefault();
    }, { passive: false });
    window.addEventListener('keyup', (e) => {
      const k = e.key.length === 1 ? e.key.toLowerCase() : e.key;
      keys.delete(k);
    });
    window.addEventListener('blur', () => keys.clear());

    // ===== Visit nearest object of a given type =====
    function findNearest(type, searchRadius) {
      const ccx = Math.floor(cam[0] / CHUNK_SIZE);
      const ccy = Math.floor(cam[1] / CHUNK_SIZE);
      const ccz = Math.floor(cam[2] / CHUNK_SIZE);
      let best = null, bestD2 = Infinity;
      for (let dx = -searchRadius; dx <= searchRadius; dx++) {
        for (let dy = -searchRadius; dy <= searchRadius; dy++) {
          for (let dz = -searchRadius; dz <= searchRadius; dz++) {
            const objs = getChunk(ccx + dx, ccy + dy, ccz + dz);
            for (const obj of objs) {
              if (obj.type !== type) continue;
              const ddx = obj.wx - cam[0];
              const ddy = obj.wy - cam[1];
              const ddz = obj.wz - cam[2];
              const d2 = ddx * ddx + ddy * ddy + ddz * ddz;
              if (d2 < bestD2) { bestD2 = d2; best = obj; }
            }
          }
        }
      }
      return best;
    }
    // Approach multipliers (how many object-radii away to land).
    // Bigger objects (BHs, nebulae) need wider margin to look good on screen.
    const APPROACH_MUL = { planet: 5, star: 30, nebula: 2.5, blackhole: 80 };
    // Some types are very rare — expand search radius accordingly.
    const SEARCH_RADIUS = { planet: 8, star: 6, nebula: 15, blackhole: 30 };
    document.querySelectorAll('.coord-visit').forEach((btn) => {
      btn.addEventListener('click', () => {
        const type = btn.dataset.type;
        const orig = btn.textContent;
        btn.textContent = '…';
        const target = findNearest(type, SEARCH_RADIUS[type] || 10);
        if (!target) {
          btn.textContent = 'none nearby';
          setTimeout(() => { btn.textContent = orig; }, 1500);
          return;
        }
        const approach = target.physRadius * (APPROACH_MUL[type] || 10);
        teleport(target.wx, target.wy, target.wz - approach);
        drifting = false;
        if (btnPause) btnPause.textContent = '▶ Resume';
        btn.textContent = orig;
      });
    });

    // ===== render =====
    function project(dx, dy, dz) {
      if (dz <= 1e6) return null; // behind/near plane (1 Mm)
      const k = focal / (dz / 1e15); // scale so that ~1e15 m maps reasonably
      return { px: cx + dx / 1e15 * k, py: cy + dy / 1e15 * k, k, dz };
    }

    function drawStar(px, py, color, alpha, size) {
      ctx.fillStyle = `rgba(${color},${alpha.toFixed(3)})`;
      ctx.fillRect(px - size / 2, py - size / 2, size, size);
    }

    // ===== type-specific realistic surface rendering =====
    function renderPlanetSurface(ctx, px, py, rad, obj) {
      const r = mulberry32(objHash(obj));
      const kind = obj.kind || 'rocky';
      ctx.save();
      ctx.beginPath(); ctx.arc(px, py, rad, 0, Math.PI * 2); ctx.clip();

      if (kind === 'gas_giant' || kind === 'ice_giant') {
        // Zonal bands: parallel stripes of varying brightness across the disc
        const bands = 8 + Math.floor(r() * 6);
        for (let b = 0; b < bands; b++) {
          const t0 = b / bands;
          const t1 = (b + 1) / bands;
          const y0 = py + (t0 * 2 - 1) * rad;
          const y1 = py + (t1 * 2 - 1) * rad;
          const k = kind === 'gas_giant' ? 0.65 + r() * 0.55 : 0.80 + r() * 0.30;
          const drift = (r() - 0.5) * 30;
          const cr = Math.max(0, Math.min(255, Math.floor(obj.cr * k + drift)));
          const cg = Math.max(0, Math.min(255, Math.floor(obj.cg * k + drift)));
          const cb = Math.max(0, Math.min(255, Math.floor(obj.cb * k + drift)));
          ctx.fillStyle = `rgba(${cr},${cg},${cb},${kind === 'gas_giant' ? 0.55 : 0.35})`;
          ctx.fillRect(px - rad, y0, rad * 2, y1 - y0);
        }
        // A single big storm spot on gas giants
        if (kind === 'gas_giant' && rad > 12) {
          const stormX = px + (r() - 0.5) * rad * 0.7;
          const stormY = py + (r() - 0.5) * rad * 0.6;
          const stormR = rad * (0.10 + r() * 0.12);
          const sg = ctx.createRadialGradient(stormX, stormY, 0, stormX, stormY, stormR);
          sg.addColorStop(0, 'rgba(210,80,55,0.85)');
          sg.addColorStop(0.7, 'rgba(160,55,40,0.5)');
          sg.addColorStop(1, 'rgba(160,55,40,0)');
          ctx.fillStyle = sg;
          ctx.beginPath(); ctx.ellipse(stormX, stormY, stormR * 1.6, stormR, 0, 0, Math.PI * 2); ctx.fill();
        }
      } else if (kind === 'ocean') {
        // Continents — irregular darker green-brown blobs
        const conts = 3 + Math.floor(r() * 4);
        for (let c = 0; c < conts; c++) {
          const ang = r() * Math.PI * 2;
          const dist = Math.sqrt(r()) * rad * 0.8;
          const cx0 = px + Math.cos(ang) * dist;
          const cy0 = py + Math.sin(ang) * dist;
          const cR = rad * (0.12 + r() * 0.22);
          ctx.fillStyle = `rgba(${90 + r() * 60 | 0},${110 + r() * 60 | 0},${60 + r() * 40 | 0},0.62)`;
          ctx.beginPath();
          // Lumpy continent: combine a few overlapping arcs
          for (let s = 0; s < 5; s++) {
            const sa = r() * Math.PI * 2;
            const sd = r() * cR * 0.6;
            const sR = cR * (0.55 + r() * 0.5);
            ctx.arc(cx0 + Math.cos(sa) * sd, cy0 + Math.sin(sa) * sd, sR, 0, Math.PI * 2);
          }
          ctx.fill();
        }
        // Cloud bands — wispy whites
        if (rad > 10) {
          const cBands = 2 + Math.floor(r() * 3);
          for (let b = 0; b < cBands; b++) {
            const cy0 = py + (r() - 0.5) * rad * 1.6;
            const w = rad * (0.4 + r() * 0.8);
            const h = rad * (0.05 + r() * 0.07);
            ctx.fillStyle = `rgba(255,255,255,${(0.16 + r() * 0.14).toFixed(2)})`;
            ctx.beginPath();
            ctx.ellipse(px + (r() - 0.5) * rad * 0.4, cy0, w, h, 0, 0, Math.PI * 2);
            ctx.fill();
          }
        }
      } else if (kind === 'lava') {
        // Dark crusted surface with bright glowing cracks/lava pools
        ctx.fillStyle = 'rgba(40,15,8,0.55)';
        ctx.fillRect(px - rad, py - rad, rad * 2, rad * 2);
        const pools = 8 + Math.floor(r() * 12);
        for (let i = 0; i < pools; i++) {
          const ang = r() * Math.PI * 2;
          const dist = Math.sqrt(r()) * rad * 0.95;
          const lx = px + Math.cos(ang) * dist;
          const ly = py + Math.sin(ang) * dist;
          const lr = rad * (0.04 + r() * 0.14);
          const lg = ctx.createRadialGradient(lx, ly, 0, lx, ly, lr);
          lg.addColorStop(0, 'rgba(255,200,80,0.95)');
          lg.addColorStop(0.4, 'rgba(255,90,30,0.7)');
          lg.addColorStop(1, 'rgba(180,30,10,0)');
          ctx.fillStyle = lg;
          ctx.beginPath(); ctx.arc(lx, ly, lr, 0, Math.PI * 2); ctx.fill();
        }
      } else if (kind === 'shrouded') {
        // Smooth thick atmosphere with subtle swirls
        const swirls = 4 + Math.floor(r() * 4);
        for (let i = 0; i < swirls; i++) {
          const ang = r() * Math.PI * 2;
          const dist = Math.sqrt(r()) * rad * 0.7;
          const cx0 = px + Math.cos(ang) * dist;
          const cy0 = py + Math.sin(ang) * dist;
          const cR = rad * (0.18 + r() * 0.25);
          const cg = ctx.createRadialGradient(cx0, cy0, 0, cx0, cy0, cR);
          cg.addColorStop(0, `rgba(${(obj.cr + 30) | 0},${(obj.cg + 25) | 0},${(obj.cb + 15) | 0},0.4)`);
          cg.addColorStop(1, 'rgba(0,0,0,0)');
          ctx.fillStyle = cg;
          ctx.beginPath(); ctx.arc(cx0, cy0, cR, 0, Math.PI * 2); ctx.fill();
        }
      } else if (kind === 'iceworld') {
        // Mostly white with subtle cracks and small darker patches
        const cracks = 3 + Math.floor(r() * 4);
        ctx.strokeStyle = 'rgba(80,100,140,0.45)';
        ctx.lineWidth = Math.max(0.5, rad * 0.012);
        for (let i = 0; i < cracks; i++) {
          const a0 = r() * Math.PI * 2;
          const a1 = a0 + (r() - 0.5) * Math.PI;
          const r0 = r() * rad;
          const r1 = r() * rad;
          ctx.beginPath();
          ctx.moveTo(px + Math.cos(a0) * r0, py + Math.sin(a0) * r0);
          ctx.lineTo(px + Math.cos(a1) * r1, py + Math.sin(a1) * r1);
          ctx.stroke();
        }
        // Sparse darker spots
        const spots = 4 + Math.floor(r() * 6);
        for (let i = 0; i < spots; i++) {
          const ang = r() * Math.PI * 2;
          const dist = Math.sqrt(r()) * rad;
          const sx = px + Math.cos(ang) * dist;
          const sy = py + Math.sin(ang) * dist;
          const sR = rad * (0.03 + r() * 0.08);
          ctx.fillStyle = `rgba(150,170,190,0.35)`;
          ctx.beginPath(); ctx.arc(sx, sy, sR, 0, Math.PI * 2); ctx.fill();
        }
      } else {
        // rocky / desert — cratered surface (deterministic crater field)
        const craters = 6 + Math.floor(Math.min(40, rad / 5));
        for (let i = 0; i < craters; i++) {
          const ang = r() * Math.PI * 2;
          const dist = Math.sqrt(r()) * rad * 0.97;
          const cx0 = px + Math.cos(ang) * dist;
          const cy0 = py + Math.sin(ang) * dist;
          const cR = rad * (0.025 + Math.pow(r(), 2.5) * 0.16);
          // Each crater: darker fill + a bright rim
          const dim = 0.45 + r() * 0.25;
          ctx.fillStyle = `rgba(${(obj.cr * dim) | 0},${(obj.cg * dim) | 0},${(obj.cb * dim) | 0},0.55)`;
          ctx.beginPath(); ctx.arc(cx0, cy0, cR, 0, Math.PI * 2); ctx.fill();
          if (cR > 1.2) {
            ctx.strokeStyle = `rgba(${Math.min(255, obj.cr + 35)},${Math.min(255, obj.cg + 30)},${Math.min(255, obj.cb + 25)},0.55)`;
            ctx.lineWidth = Math.max(0.4, cR * 0.18);
            ctx.beginPath(); ctx.arc(cx0, cy0, cR, 0, Math.PI * 2); ctx.stroke();
          }
        }
      }
      ctx.restore();
    }

    function frame(nowMs) {
      const dt = Math.min(0.1, (nowMs - lastFrameMs) / 1000);
      lastFrameMs = nowMs;
      if (drifting) cam[2] += DRIFT_V * dt * TIME_MUL;
      // Manual WASD/QE — slow precision by default (good for approaching a star);
      // hold Shift to cruise at light-year scale.
      if (keys.size) {
        const isShift = keys.has('shift') || keys.has('Shift');
        const speed = isShift ? 1e16 : 1e10; // m/s — 1 ly/s vs ~33c
        const mv = speed * dt;
        if (keys.has('w')) cam[2] += mv;
        if (keys.has('s')) cam[2] -= mv;
        if (keys.has('d')) cam[0] += mv;
        if (keys.has('a')) cam[0] -= mv;
        if (keys.has('q') || keys.has(' ')) cam[1] -= mv;
        if (keys.has('e')) cam[1] += mv;
      }
      if (nowMs - lastSavedMs > 500) {
        savePosition();
        updateUrl();
        refreshUI();
        lastSavedMs = nowMs;
      }

      ctx.clearRect(0, 0, W, H);
      const dark = isDark();
      // soft tint in light mode so stars read
      if (!dark) {
        ctx.fillStyle = 'rgba(245,247,250,0.5)';
        ctx.fillRect(0, 0, W, H);
      }

      const ccx = Math.floor(cam[0] / CHUNK_SIZE);
      const ccy = Math.floor(cam[1] / CHUNK_SIZE);
      const ccz = Math.floor(cam[2] / CHUNK_SIZE);

      // Iterate chunks in front of camera (plus small back margin for objects just passed)
      const minDz = -1;
      const maxDz = N_RADIUS;
      const renderD2 = RENDER_DISTANCE * RENDER_DISTANCE;

      // Two-pass: nebulae & black holes drawn separately to handle compositing
      const nebulaeDraw = [];
      const blackHolesDraw = [];

      for (let dx = -N_RADIUS; dx <= N_RADIUS; dx++) {
        for (let dy = -N_RADIUS; dy <= N_RADIUS; dy++) {
          for (let dz = minDz; dz <= maxDz; dz++) {
            const chx = ccx + dx;
            const chy = ccy + dy;
            const chz = ccz + dz;
            const objs = getChunk(chx, chy, chz);
            if (!objs.length) continue;
            for (const obj of objs) {
              const ox = obj.wx - cam[0];
              const oy = obj.wy - cam[1];
              const oz = obj.wz - cam[2];
              const d2 = ox * ox + oy * oy + oz * oz;
              if (d2 > renderD2) continue;
              const proj = project(ox, oy, oz);
              if (!proj) continue;
              if (proj.px < -50 || proj.px > W + 50 || proj.py < -50 || proj.py > H + 50) continue;

              const dist = Math.sqrt(d2);
              const depth = 1 - dist / RENDER_DISTANCE; // 0 (far) → 1 (near)

              if (obj.type === 'star') {
                // True angular radius in screen pixels
                const angRad = obj.physRadius / 1e15 * proj.k;
                if (angRad > 2) {
                  // Close enough to render as a glowing disc with corona
                  const disc = ctx.createRadialGradient(proj.px, proj.py, 0, proj.px, proj.py, angRad);
                  disc.addColorStop(0,   `rgba(${Math.min(255, obj.cr + 60)},${Math.min(255, obj.cg + 60)},${Math.min(255, obj.cb + 60)},1)`);
                  disc.addColorStop(0.85, `rgba(${obj.cr},${obj.cg},${obj.cb},0.95)`);
                  disc.addColorStop(1,   `rgba(${obj.cr},${obj.cg},${obj.cb},0)`);
                  ctx.fillStyle = disc;
                  ctx.beginPath(); ctx.arc(proj.px, proj.py, angRad, 0, Math.PI * 2); ctx.fill();
                  // LOD: surface granulation (clipped to disc)
                  if (angRad > 18) {
                    const r = mulberry32(objHash(obj));
                    ctx.save();
                    ctx.beginPath(); ctx.arc(proj.px, proj.py, angRad * 0.98, 0, Math.PI * 2); ctx.clip();
                    const granules = 20 + Math.floor(Math.min(60, angRad / 6));
                    for (let s = 0; s < granules; s++) {
                      const ang = r() * Math.PI * 2;
                      const dist = Math.sqrt(r()) * angRad * 0.97;
                      const sx = proj.px + Math.cos(ang) * dist;
                      const sy = proj.py + Math.sin(ang) * dist;
                      const spotR = angRad * (0.015 + r() * 0.045);
                      // Mix darker (cool downflows) and brighter (hot upflows) cells
                      const bright = r() > 0.5;
                      const k = bright ? 1.18 : 0.72;
                      const cr = Math.min(255, (obj.cr * k) | 0);
                      const cg = Math.min(255, (obj.cg * k) | 0);
                      const cb = Math.min(255, (obj.cb * k) | 0);
                      ctx.fillStyle = `rgba(${cr},${cg},${cb},${bright ? 0.55 : 0.45})`;
                      ctx.beginPath(); ctx.arc(sx, sy, spotR, 0, Math.PI * 2); ctx.fill();
                    }
                    ctx.restore();
                  }
                  // LOD: prominences flaring off the limb
                  if (angRad > 40) {
                    const r = mulberry32(objHash(obj) ^ 0xBADC0DE);
                    const prom = 2 + Math.floor(r() * 4);
                    for (let p = 0; p < prom; p++) {
                      const ang = r() * Math.PI * 2;
                      const px = proj.px + Math.cos(ang) * angRad;
                      const py = proj.py + Math.sin(ang) * angRad;
                      const flareR = angRad * (0.18 + r() * 0.25);
                      const flare = ctx.createRadialGradient(px, py, 0, px, py, flareR);
                      flare.addColorStop(0, 'rgba(255,170,80,0.7)');
                      flare.addColorStop(0.6, 'rgba(255,90,40,0.25)');
                      flare.addColorStop(1, 'rgba(255,40,20,0)');
                      ctx.fillStyle = flare;
                      ctx.beginPath(); ctx.arc(px, py, flareR, 0, Math.PI * 2); ctx.fill();
                    }
                  }
                  // Corona / halo
                  const halo = ctx.createRadialGradient(proj.px, proj.py, angRad, proj.px, proj.py, angRad * 3);
                  halo.addColorStop(0, `rgba(${obj.cr},${obj.cg},${obj.cb},0.35)`);
                  halo.addColorStop(1, `rgba(${obj.cr},${obj.cg},${obj.cb},0)`);
                  ctx.fillStyle = halo;
                  ctx.beginPath(); ctx.arc(proj.px, proj.py, angRad * 3, 0, Math.PI * 2); ctx.fill();
                } else {
                  // Distant point source — brightness-driven pixel size (current style)
                  const size = Math.max(0.5, depth * 3.2 * obj.sizeMul);
                  const a = obj.bri * (0.15 + depth * 0.8);
                  if (dark) {
                    drawStar(proj.px, proj.py, `${obj.cr},${obj.cg},${obj.cb}`, a, size);
                  } else {
                    const rr = Math.min(60, Math.floor(255 - obj.cr) * 0.3 | 0);
                    const gg = Math.min(60, Math.floor(255 - obj.cg) * 0.3 | 0);
                    const bb = Math.min(60, Math.floor(255 - obj.cb) * 0.3 | 0);
                    drawStar(proj.px, proj.py, `${rr},${gg},${bb}`, a * 0.6, size);
                  }
                }
              } else if (obj.type === 'planet') {
                // True angular size: rad_px = physRadius * focal / dz.
                // proj.k = focal / (dz/1e15), so multiply physRadius (m) / 1e15 by k.
                const rad = obj.physRadius / 1e15 * proj.k;
                if (rad < 0.6) {
                  // Too far to resolve — render as faint dot
                  drawStar(proj.px, proj.py, `${obj.cr},${obj.cg},${obj.cb}`, 0.5 * depth, Math.max(0.6, rad * 4));
                } else {
                  const visAlpha = Math.min(1, 0.4 + depth);
                  const grad = ctx.createRadialGradient(proj.px - rad * 0.35, proj.py - rad * 0.35, 0, proj.px, proj.py, rad);
                  grad.addColorStop(0, `rgba(${Math.min(255, obj.cr + 30)},${Math.min(255, obj.cg + 30)},${Math.min(255, obj.cb + 30)},${visAlpha.toFixed(2)})`);
                  grad.addColorStop(0.75, `rgba(${obj.cr},${obj.cg},${obj.cb},${visAlpha.toFixed(2)})`);
                  grad.addColorStop(1, `rgba(${(obj.cr * 0.5) | 0},${(obj.cg * 0.5) | 0},${(obj.cb * 0.5) | 0},${visAlpha.toFixed(2)})`);
                  ctx.fillStyle = grad;
                  ctx.beginPath();
                  ctx.arc(proj.px, proj.py, rad, 0, Math.PI * 2);
                  ctx.fill();
                  // LOD: realistic surface rendering per planet kind
                  if (rad > 5) {
                    renderPlanetSurface(ctx, proj.px, proj.py, rad, obj);
                  }
                  // LOD: terminator shading (day/night line) when close
                  if (rad > 15) {
                    const term = ctx.createLinearGradient(proj.px - rad, proj.py, proj.px + rad, proj.py);
                    term.addColorStop(0, 'rgba(0,0,0,0)');
                    term.addColorStop(0.7, 'rgba(0,0,0,0)');
                    term.addColorStop(1, 'rgba(0,0,0,0.55)');
                    ctx.save();
                    ctx.beginPath(); ctx.arc(proj.px, proj.py, rad, 0, Math.PI * 2); ctx.clip();
                    ctx.fillStyle = term;
                    ctx.fillRect(proj.px - rad, proj.py - rad, rad * 2, rad * 2);
                    ctx.restore();
                  }
                  // LOD: atmospheric limb glow (only for worlds with atmospheres)
                  if (rad > 25 && (obj.kind === 'ocean' || obj.kind === 'gas_giant' || obj.kind === 'ice_giant' || obj.kind === 'shrouded')) {
                    const ar = Math.min(255, obj.cr + 60);
                    const ag = Math.min(255, obj.cg + 60);
                    const ab = Math.min(255, obj.cb + 60);
                    const limb = ctx.createRadialGradient(proj.px, proj.py, rad * 0.92, proj.px, proj.py, rad * 1.18);
                    limb.addColorStop(0,   `rgba(${ar},${ag},${ab},0)`);
                    limb.addColorStop(0.45,`rgba(${ar},${ag},${ab},0.4)`);
                    limb.addColorStop(1,   `rgba(${ar},${ag},${ab},0)`);
                    ctx.fillStyle = limb;
                    ctx.beginPath(); ctx.arc(proj.px, proj.py, rad * 1.18, 0, Math.PI * 2); ctx.fill();
                  }
                  if (obj.hasRing && rad > 2) {
                    ctx.strokeStyle = `rgba(${obj.cr},${obj.cg},${obj.cb},${(0.55 * visAlpha).toFixed(2)})`;
                    ctx.lineWidth = Math.max(0.6, rad * 0.12);
                    ctx.beginPath();
                    ctx.ellipse(proj.px, proj.py, rad * 1.7, rad * 0.45, 0.4, 0, Math.PI * 2);
                    ctx.stroke();
                  }
                }
              } else if (obj.type === 'nebula') {
                nebulaeDraw.push({ proj, obj, depth });
              } else if (obj.type === 'blackhole') {
                blackHolesDraw.push({ proj, obj, depth });
              }
            }
          }
        }
      }

      // Nebulae layer (additive in dark, multiply in light)
      if (nebulaeDraw.length) {
        ctx.globalCompositeOperation = dark ? 'lighter' : 'multiply';
        for (const n of nebulaeDraw) {
          const rad = Math.min(4000, n.obj.physRadius / 1e15 * n.proj.k);
          if (rad < 8) continue;
          // Base cloud
          const grad = ctx.createRadialGradient(n.proj.px, n.proj.py, 0, n.proj.px, n.proj.py, rad);
          grad.addColorStop(0,   `rgba(${n.obj.cr},${n.obj.cg},${n.obj.cb},0.22)`);
          grad.addColorStop(0.4, `rgba(${n.obj.cr},${n.obj.cg},${n.obj.cb},0.07)`);
          grad.addColorStop(1,   `rgba(${n.obj.cr},${n.obj.cg},${n.obj.cb},0)`);
          ctx.fillStyle = grad;
          ctx.fillRect(n.proj.px - rad, n.proj.py - rad, rad * 2, rad * 2);
          // LOD: layered sub-clouds with color variation
          if (rad > 120) {
            const r = mulberry32(objHash(n.obj));
            const subs = 4 + Math.floor(Math.min(10, rad / 80));
            for (let s = 0; s < subs; s++) {
              const ang = r() * Math.PI * 2;
              const dist = r() * rad * 0.6;
              const sx = n.proj.px + Math.cos(ang) * dist;
              const sy = n.proj.py + Math.sin(ang) * dist;
              const subR = rad * (0.18 + r() * 0.4);
              const shift = 50;
              const cr = Math.max(0, Math.min(255, (n.obj.cr + (r() - 0.5) * shift) | 0));
              const cg = Math.max(0, Math.min(255, (n.obj.cg + (r() - 0.5) * shift) | 0));
              const cb = Math.max(0, Math.min(255, (n.obj.cb + (r() - 0.5) * shift) | 0));
              const g2 = ctx.createRadialGradient(sx, sy, 0, sx, sy, subR);
              g2.addColorStop(0, `rgba(${cr},${cg},${cb},0.16)`);
              g2.addColorStop(1, `rgba(${cr},${cg},${cb},0)`);
              ctx.fillStyle = g2;
              ctx.fillRect(sx - subR, sy - subR, subR * 2, subR * 2);
            }
          }
          // LOD: bright wisps / filaments when very close
          if (rad > 600) {
            const r = mulberry32(objHash(n.obj) ^ 0xF11AFF);
            const wisps = 6 + Math.floor(r() * 6);
            ctx.strokeStyle = `rgba(${Math.min(255, n.obj.cr + 60)},${Math.min(255, n.obj.cg + 60)},${Math.min(255, n.obj.cb + 60)},0.18)`;
            ctx.lineWidth = 1.2;
            for (let w = 0; w < wisps; w++) {
              const ang = r() * Math.PI * 2;
              const len = rad * (0.35 + r() * 0.55);
              const startR = r() * rad * 0.3;
              const sx = n.proj.px + Math.cos(ang) * startR;
              const sy = n.proj.py + Math.sin(ang) * startR;
              const ex = sx + Math.cos(ang) * len;
              const ey = sy + Math.sin(ang) * len;
              const mx = (sx + ex) / 2 + (r() - 0.5) * len * 0.3;
              const my = (sy + ey) / 2 + (r() - 0.5) * len * 0.3;
              ctx.beginPath();
              ctx.moveTo(sx, sy);
              ctx.quadraticCurveTo(mx, my, ex, ey);
              ctx.stroke();
            }
          }
        }
        ctx.globalCompositeOperation = 'source-over';
      }

      // Black holes (drawn last). Angular size = event-horizon physRadius * focal / dz
      for (const bh of blackHolesDraw) {
        const rEH = Math.min(800, bh.obj.physRadius / 1e15 * bh.proj.k);
        if (rEH < 2) continue;
        // Outer halo / gravitational lensing glow
        const rHalo = rEH * 6;
        const halo = ctx.createRadialGradient(bh.proj.px, bh.proj.py, rEH * 0.5, bh.proj.px, bh.proj.py, rHalo);
        halo.addColorStop(0,   'rgba(255,180,90,0.5)');
        halo.addColorStop(0.2, 'rgba(255,120,40,0.2)');
        halo.addColorStop(0.5, 'rgba(120,60,200,0.08)');
        halo.addColorStop(1,   'rgba(0,0,0,0)');
        ctx.fillStyle = halo;
        ctx.fillRect(bh.proj.px - rHalo, bh.proj.py - rHalo, rHalo * 2, rHalo * 2);

        if (rEH < 10) {
          // Far view: simple ring + horizon
          ctx.strokeStyle = 'rgba(255,210,140,0.85)';
          ctx.lineWidth = Math.max(1, rEH * 0.22);
          ctx.beginPath();
          ctx.arc(bh.proj.px, bh.proj.py, rEH * 1.5, 0, Math.PI * 2);
          ctx.stroke();
        } else {
          // LOD: tilted accretion disc with bright/dim Doppler asymmetry
          const r = mulberry32(objHash(bh.obj));
          const tilt = (r() - 0.5) * 0.6 + 0.35; // radians, slight randomized tilt
          ctx.save();
          ctx.translate(bh.proj.px, bh.proj.py);
          ctx.rotate(tilt);
          const bands = 6;
          for (let b = 0; b < bands; b++) {
            const t = b / (bands - 1);
            const rBand = rEH * (1.4 + t * 2.2);
            const minor = rBand * 0.22;
            const hueBase = 22 + t * 18;
            const alpha = (0.85 - t * 0.55).toFixed(2);
            const gradH = ctx.createLinearGradient(-rBand, 0, rBand, 0);
            gradH.addColorStop(0, `hsla(${hueBase + 20}, 90%, 70%, ${alpha})`);
            gradH.addColorStop(0.5, `hsla(${hueBase}, 80%, 50%, ${alpha})`);
            gradH.addColorStop(1, `hsla(${hueBase - 12}, 70%, 32%, ${alpha})`);
            ctx.strokeStyle = gradH;
            ctx.lineWidth = Math.max(0.8, rEH * 0.18);
            ctx.beginPath();
            ctx.ellipse(0, 0, rBand, minor, 0, 0, Math.PI * 2);
            ctx.stroke();
          }
          ctx.restore();
          // LOD: photon ring — thin bright sphere just outside horizon
          ctx.strokeStyle = 'rgba(255,250,200,0.9)';
          ctx.lineWidth = Math.max(0.6, rEH * 0.06);
          ctx.beginPath();
          ctx.arc(bh.proj.px, bh.proj.py, rEH * 1.18, 0, Math.PI * 2);
          ctx.stroke();
        }
        // Event horizon — pitch black
        ctx.fillStyle = '#000';
        ctx.beginPath();
        ctx.arc(bh.proj.px, bh.proj.py, rEH, 0, Math.PI * 2);
        ctx.fill();
      }

      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);

    // Save on unload too
    window.addEventListener('beforeunload', savePosition);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();

  (function () {
    const lightbox = document.getElementById('art-lightbox');
    const img = document.getElementById('art-lightbox-img');
    const caption = document.getElementById('art-lightbox-caption');
    const closeBtn = document.getElementById('art-lightbox-close');
    const prevBtn = document.getElementById('art-lightbox-prev');
    const nextBtn = document.getElementById('art-lightbox-next');
    // Fade-loop initialization (e.g. cubism deconstruction) — cycle frame opacity
    document.querySelectorAll('.art-fade').forEach((fade) => {
      const frames = Array.from(fade.querySelectorAll('.art-fade-frame'));
      if (frames.length < 2) return;
      // Equalize container height to the natural aspect of the first frame
      const first = frames[0];
      function setHeight() {
        if (first.naturalWidth && first.naturalHeight) {
          const ratio = first.naturalHeight / first.naturalWidth;
          fade.style.aspectRatio = `${first.naturalWidth} / ${first.naturalHeight}`;
        }
      }
      if (first.complete) setHeight();
      else first.addEventListener('load', setHeight, { once: true });
      let i = 0;
      setInterval(() => {
        frames[i].style.opacity = '0';
        i = (i + 1) % frames.length;
        frames[i].style.opacity = '1';
      }, 2500);
      // Clicking fade container opens lightbox with the currently visible frame
      fade.addEventListener('click', () => {
        const cat = fade.dataset.category;
        const list = document.querySelectorAll('.art-thumb');
        const match = Array.from(list).find((t) => t.dataset.category === cat && t.dataset.image === frames[i].src.replace(window.location.origin, ''));
        if (match) match.click();
      });
    });

    // Pager initialization (e.g. children's book) — only one page visible at a time
    document.querySelectorAll('.art-pager').forEach((pager) => {
      const pages = Array.from(pager.querySelectorAll('.art-pager-page'));
      const total = pages.length;
      const prevBtn = pager.querySelector('.art-pager-prev');
      const nextBtn = pager.querySelector('.art-pager-next');
      const counter = pager.querySelector('.art-pager-counter');
      let i = 0;
      function render() {
        pages.forEach((p, idx) => p.classList.toggle('hidden', idx !== i));
        counter.textContent = `${i + 1} / ${total}`;
        prevBtn.disabled = i === 0;
        nextBtn.disabled = i === total - 1;
      }
      prevBtn.addEventListener('click', () => { if (i > 0) { i--; render(); } });
      nextBtn.addEventListener('click', () => { if (i < total - 1) { i++; render(); } });
      render();
    });

    const thumbs = Array.from(document.querySelectorAll('.art-thumb'));

    // Group thumbs by category so arrow keys cycle within a category
    const groups = new Map();
    thumbs.forEach((t) => {
      const cat = t.dataset.category;
      if (!groups.has(cat)) groups.set(cat, []);
      groups.get(cat).push(t);
    });

    let currentGroup = [];
    let currentIndex = 0;

    function show(thumb) {
      const cat = thumb.dataset.category;
      currentGroup = groups.get(cat) || [thumb];
      currentIndex = currentGroup.indexOf(thumb);
      render();
      lightbox.classList.remove('hidden');
      lightbox.classList.add('flex');
      document.body.style.overflow = 'hidden';
    }

    function render() {
      const t = currentGroup[currentIndex];
      img.src = t.dataset.image;
      img.alt = t.dataset.caption || '';
      caption.textContent = currentGroup.length > 1
        ? `${t.dataset.category} — ${currentIndex + 1} / ${currentGroup.length}`
        : (t.dataset.caption || t.dataset.category);
      prevBtn.style.visibility = currentGroup.length > 1 ? 'visible' : 'hidden';
      nextBtn.style.visibility = currentGroup.length > 1 ? 'visible' : 'hidden';
    }

    function hide() {
      lightbox.classList.add('hidden');
      lightbox.classList.remove('flex');
      img.src = '';
      document.body.style.overflow = '';
    }

    function next() {
      currentIndex = (currentIndex + 1) % currentGroup.length;
      render();
    }

    function prev() {
      currentIndex = (currentIndex - 1 + currentGroup.length) % currentGroup.length;
      render();
    }

    thumbs.forEach((t) => t.addEventListener('click', () => show(t)));
    closeBtn.addEventListener('click', hide);
    lightbox.addEventListener('click', hide);
    prevBtn.addEventListener('click', (e) => { e.stopPropagation(); prev(); });
    nextBtn.addEventListener('click', (e) => { e.stopPropagation(); next(); });

    document.addEventListener('keydown', (e) => {
      if (lightbox.classList.contains('hidden')) return;
      if (e.key === 'Escape') hide();
      else if (e.key === 'ArrowRight') next();
      else if (e.key === 'ArrowLeft') prev();
    });
  })();
</script> </main> <footer class="px-6 py-10 max-w-3xl mx-auto border-t border-border mt-16"> <div class="text-center text-sm text-muted">© 2026 Alex</div> </footer> </body></html>
